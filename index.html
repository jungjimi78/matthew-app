<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>마태오</title>
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=1">
<link rel="icon" type="image/png" href="./apple-touch-icon.png?v=1">
<meta name="apple-mobile-web-app-title" content="마태오">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5ead8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@600;900&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;min-height:100%;
  background:
    radial-gradient(circle at 15% 0%, rgba(255,224,169,.82) 0, transparent 32%),
    radial-gradient(circle at 88% 4%, rgba(255,245,217,.9) 0, transparent 30%),
    linear-gradient(180deg,#fff7e8,#f2e3cb);
  font-family:"Gowun Dodum",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",Arial,sans-serif;
  color:#211914;
}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.app{max-width:720px;margin:0 auto}
.head{
  position:sticky;top:0;z-index:5;
  background:rgba(245,234,216,.86);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  padding:18px;border-bottom:1px solid rgba(139,115,91,.14);
}
.title{display:flex;gap:12px;align-items:center}
.icon{width:46px;height:46px;border-radius:16px;background-image:url('./apple-touch-icon.png');background-size:cover;background-position:center;box-shadow:0 8px 22px rgba(91,58,27,.16)}
h1{margin:0;font-family:"Noto Serif KR",serif;font-size:29px;font-weight:900;letter-spacing:-.8px}
.sub{margin:7px 0 0 58px;color:#8b735b;font-size:14px}
#home{padding:18px 16px 34px;display:block}
#reader{display:none;padding:16px}
.homeCard{background:rgba(255,250,241,.95);border-radius:30px;padding:22px;box-shadow:0 18px 45px rgba(91,58,27,.14);margin-bottom:16px;text-align:center}
.homeIcon{width:112px;height:112px;border-radius:32px;margin:0 auto 15px;background-image:url('./apple-touch-icon.png');background-size:cover;background-position:center;box-shadow:0 14px 30px rgba(91,58,27,.18)}
.homeCard h2{font-family:"Noto Serif KR",serif;font-size:38px;margin:0 0 8px}
.homeCard p{color:#8b735b;margin:0;line-height:1.45}
.startBtn{width:100%;border:0;border-radius:22px;padding:17px;background:linear-gradient(135deg,#5e3d20,#b87a3a);color:white;font-weight:900;font-size:18px;box-shadow:0 12px 30px rgba(91,58,27,.22)}
.top{display:flex;justify-content:space-between;align-items:center;margin:8px 0 14px}
.back{border:0;background:rgba(255,250,241,.9);color:#9b6a32;border-radius:999px;padding:10px 14px;font-weight:900;font-size:16px}
.badge{background:rgba(255,250,241,.9);border-radius:999px;padding:9px 13px;color:#8b735b;font-weight:900;font-size:14px}
.written{background:rgba(255,250,241,.95);border-radius:999px;width:max-content;margin:0 auto 14px;padding:10px 14px;box-shadow:0 8px 24px rgba(91,58,27,.1);color:#8b735b;font-weight:900;font-size:14px}
.written input{border:0;background:transparent;font-weight:900;color:#211914;font-size:14px}
.chapter{background:rgba(255,250,241,.96);border-radius:32px;padding:26px 21px;text-align:center;box-shadow:0 18px 45px rgba(91,58,27,.14);animation:rise .34s ease both}
.day{color:#c6924a;font-weight:900;font-size:13px;letter-spacing:.4px}
.chapter h2{font-family:"Noto Serif KR",serif;font-size:38px;margin:13px 0 7px;letter-spacing:-1.2px}
.chapter p{margin:0;color:#8b735b;font-weight:700}
.qcard{background:linear-gradient(135deg,rgba(255,247,228,.96),rgba(255,250,241,.98));border-radius:32px;padding:21px;margin:15px 0;box-shadow:0 18px 45px rgba(91,58,27,.14);animation:fadeSlide .4s ease both}
.label{font-size:13px;color:#8b735b;font-weight:900;margin-bottom:8px}
.explain{font-size:17px;line-height:1.55;font-weight:700;color:#3b2b1c;word-break:keep-all}
.question{font-family:"Noto Serif KR",serif;font-size:23px;line-height:1.5;font-weight:900;word-break:keep-all}
.field,.jumpwrap{background:rgba(255,250,241,.95);border-radius:28px;padding:17px;margin:15px 0;box-shadow:0 12px 32px rgba(91,58,27,.1)}
.field label{display:block;font-weight:900;margin-bottom:10px}
textarea{width:100%;min-height:118px;border:0;outline:0;background:#f4eadc;border-radius:20px;padding:15px;font-size:17px;line-height:1.5;font-family:"Gowun Dodum",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",Arial,sans-serif;color:#211914}
textarea:focus{background:#fff9ee;box-shadow:0 0 0 3px rgba(190,132,64,.25)}
.nav{display:flex;gap:12px;margin:18px 0}
.nav button{flex:1;border:0;border-radius:20px;padding:16px;font-weight:900;font-size:16px}
.pri{background:linear-gradient(135deg,#3c2715,#9b6a32);color:white}
.sec{background:rgba(255,250,241,.95);color:#211914;box-shadow:0 8px 24px rgba(91,58,27,.1)}
.jump{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.jump button{border:0;text-align:center;padding:10px 0;border-radius:14px;background:#f1dfc6;color:#5c4025;font-weight:900;font-size:13px}
@keyframes rise{from{opacity:0;transform:translateY(12px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:390px){h1{font-size:26px}.chapter h2{font-size:33px}.question{font-size:21px}.jump{grid-template-columns:repeat(6,1fr)}}
</style>
</head>
<body>
<div class="app">
<header class="head">
  <div class="title"><div class="icon"></div><h1>마태오</h1></div>
  <p class="sub">예수님의 말씀 앞에서 내 삶을 바로 보는 시간</p>
</header>

<main id="home">
  <div class="homeCard">
    <div class="homeIcon"></div>
    <h2>마태오</h2>
    <p>산상수훈처럼 삶을 찌르는 말씀을 현실 질문으로 묵상해봐.</p>
  </div>
  <button class="startBtn" onclick="openChapter(currentChapter)">시작하기</button>
</main>

<section id="reader">
  <div class="top"><button class="back" onclick="showHome()">‹ 처음으로</button><div class="badge">⛰️ 마태오</div></div>
  <div class="written">작성일: <input type="date" id="writtenDateInput" onchange="saveWrittenDate(this.value)"></div>
  <div class="chapter"><div class="day" id="day"></div><h2 id="chapterTitle"></h2><p id="subtitle"></p></div>
  <div class="qcard"><div class="label">짧은 설명</div><div class="explain" id="explain"></div><div class="label" style="margin-top:18px">오늘의 질문</div><div class="question" id="question"></div></div>
  <div class="field"><label>마음에 와 닿은 성경구절</label><textarea id="verse" placeholder="마음에 남은 구절을 적어봐"></textarea></div>
  <div class="field"><label>오늘 묵상 메모</label><textarea id="memo" placeholder="오늘 느낀 점을 적어봐"></textarea></div>
  <div class="nav"><button class="sec" onclick="move(-1)">이전</button><button class="pri" onclick="move(1)">다음</button></div>
  <div class="jumpwrap"><div class="label">장 바로가기</div><div class="jump" id="jump"></div></div>
</section>
</div>

<script>
const chapters = [["1장", "예수님의 족보와 탄생은 하느님의 약속이 평범하고 복잡한 역사 속에서 이어졌다는 걸 보여줌.", "나는 환경, 부모, 조건 탓하면서 시작도 안 하고 있는 거 뭐지?", "예수님의 족보와 탄생"], ["2장", "예수님은 태어나자마자 헤로데의 위협을 피해 이집트로 피하심.", "불편해질 것 같으면 바로 피하고 있는 일 하나 떠오르지 않나?", "동방 박사와 이집트 피신"], ["3장", "세례자 요한은 회개를 말뿐 아니라 삶의 열매로 보이라고 외침.", "‘미안해’는 했는데 실제 행동 바꾼 건 뭐 있음?", "세례자 요한과 예수님의 세례"], ["4장", "예수님은 배고픔과 권력과 인정의 유혹 앞에서 말씀으로 버티심.", "나 맨날 지는 유혹 뭐냐? 핸드폰, 짜증, 게으름… 솔직히 알지?", "광야의 유혹과 공생활 시작"], ["5장", "산상수훈은 세상 기준과 완전히 다른 행복과 의로움을 말함.", "손해 보기 싫어서 양보 안 한 순간 최근에 언제였지?", "산상수훈과 참된 행복"], ["6장", "기도, 자선, 단식은 남에게 보이려고 하는 게 아니라 하느님 앞에서 하는 것임.", "남들이 볼 때만 괜찮은 사람처럼 행동하고, 혼자 있을 땐 완전 다르지 않나?", "숨은 신앙과 걱정"], ["7장", "예수님은 남을 판단하기보다 먼저 자신을 보고, 들은 말씀을 실제로 행하라고 하심.", "남 지적은 잘하는데, 내가 고친 건 뭐 있음?", "판단하지 말라, 반석 위의 집"], ["8장", "예수님은 병든 이와 두려워하는 제자들에게 믿음이 무엇인지 보여주심.", "문제 생기면 기도보다 걱정 먼저 하고 있지 않나?", "치유와 풍랑을 잠재우심"], ["9장", "예수님은 죄인과 병든 사람에게 가까이 가시고, 필요한 사람을 부르심.", "‘난 아직 준비 안 됐어’ 이 말로 계속 미루고 있는 거 뭐지?", "마태오를 부르심과 치유"], ["10장", "제자들은 편한 길이 아니라 거절과 두려움 속에서도 복음을 전하는 길로 보내짐.", "불편하고 힘든 일은 일부러 피하고 있는 거 있지 않나?", "열두 제자의 파견"], ["11장", "예수님은 지친 사람에게 오라고 하시며, 무거운 짐을 혼자 지지 말라고 하심.", "힘들 때 누구한테 기대지 못하고 혼자 쌓아두는 스타일 아니야?", "나에게 오너라"], ["12장", "예수님은 율법의 형식보다 자비와 마음의 방향이 더 중요하다고 보여주심.", "해야 할 일은 안 하면서, 규칙만 지키는 척 하고 있지 않나?", "안식일 논쟁과 마음의 열매"], ["13장", "씨 뿌리는 사람의 비유는 말씀을 듣는 내 마음 상태가 얼마나 중요한지 보여줌.", "좋은 말 들었는데 바로 까먹은 거… 오늘도 있지?", "하늘 나라 비유들"], ["14장", "베드로는 예수님을 보고 물 위를 걷지만, 바람을 보자 두려움에 빠짐.", "잘 가다가 갑자기 불안해서 스스로 무너진 적 최근에 있었지?", "오천 명을 먹이심과 물 위를 걸으심"], ["15장", "예수님은 사람을 더럽히는 건 입으로 들어가는 게 아니라 마음에서 나오는 것이라고 하심.", "요즘 내 말투… 듣는 사람이 기분 좋을까 아니면 상처받을까?", "마음에서 나오는 것"], ["16장", "베드로는 예수님을 고백하지만, 곧 자기 생각으로 하느님의 길을 막으려 함.", "예수님 믿는다면서 실제 선택은 그냥 내 기준대로 하고 있지 않나?", "베드로의 고백과 십자가의 길"], ["17장", "예수님의 변모와 작은 믿음 이야기는 눈에 보이는 현실 너머를 보게 함.", "시작도 안 하고 ‘안 될 것 같아’로 끝낸 거 뭐 있음?", "거룩한 변모와 믿음"], ["18장", "예수님은 작은 이를 업신여기지 말고, 끝없이 용서하라고 가르치심.", "아직도 생각나면 짜증나는 사람 한 명 떠오르지 않나?", "겸손과 용서"], ["19장", "부자 청년은 좋은 마음이 있었지만 재물을 내려놓지 못해 예수님을 따르지 못함.", "내려놔야 하는 거 알면서도 계속 붙잡고 있는 거 뭐냐?", "부자 청년과 내려놓음"], ["20장", "포도밭 일꾼 비유는 비교가 감사와 기쁨을 무너뜨린다는 걸 보여줌.", "SNS 보다가 괜히 비교하고 기분 다운된 적 오늘도 있지?", "포도밭 일꾼과 섬김"], ["21장", "예수님은 예루살렘에 들어가시고, 말만 하는 신앙과 실제 순종을 구분하심.", "‘할게요’ 하고 안 한 거 몇 개나 쌓여 있음?", "예루살렘 입성과 두 아들의 비유"], ["22장", "예수님은 가장 큰 계명이 하느님 사랑과 이웃 사랑이라고 분명히 말씀하심.", "사랑한다고 말은 하는데, 실제 행동은 얼마나 하고 있음?", "가장 큰 계명"], ["23장", "예수님은 겉으로만 거룩해 보이는 위선을 강하게 꾸짖으심.", "사람들 앞에서 이미지 관리하는 나랑 진짜 나는 얼마나 다름?", "율법학자와 바리사이의 위선"], ["24장", "언제 끝이 올지 모르기 때문에 깨어 있고 흔들리지 말라고 하심.", "‘나중에 해야지’ 하다가 계속 미루고 있는 거 뭐냐?", "깨어 있어라"], ["25장", "열 처녀와 탈렌트 비유는 준비와 책임을 미루지 말라는 메시지를 줌.", "기회 오면 하겠다고? 준비 하나도 안 돼 있는 거 알지?", "준비와 책임"], ["26장", "제자들은 예수님과 함께하겠다고 했지만, 두려움과 압박 앞에서 무너짐.", "압박 오면 말투, 태도 바로 무너지는 거 최근에 있었지?", "최후의 만찬과 겟세마니"], ["27장", "예수님은 조롱과 고통 속에서도 끝까지 십자가의 길을 감당하심.", "힘들다고 바로 포기한 거… 솔직히 몇 개 있음?", "수난과 십자가"], ["28장", "부활은 끝났다고 생각한 자리에서 다시 시작하라는 하느님의 선언임.", "끝났다고 생각하고 그냥 놔버린 거 다시 시작할 생각 없나?", "부활과 파견"]];
const lastKey = "matthew_last_chapter_v1";
let currentChapter = Number(localStorage.getItem(lastKey) || "0");

function todayReal(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function key(type,c){ return "matthew_chapter_"+type+"_"+(c+1); }

function saveCurrent(){
  localStorage.setItem(key("verse",currentChapter), document.getElementById("verse").value);
  localStorage.setItem(key("memo",currentChapter), document.getElementById("memo").value);
  if((document.getElementById("verse").value.trim()) || (document.getElementById("memo").value.trim())) {
    if(!localStorage.getItem(key("date",currentChapter))) localStorage.setItem(key("date",currentChapter), todayReal());
  }
  localStorage.setItem(lastKey, String(currentChapter));
}
function saveWrittenDate(value){localStorage.setItem(key("date",currentChapter), value || todayReal());}
function updateWrittenDate(){document.getElementById("writtenDateInput").value = localStorage.getItem(key("date",currentChapter)) || todayReal();}
function openChapter(i){saveCurrent();currentChapter=i;localStorage.setItem(lastKey,String(currentChapter));document.getElementById("home").style.display="none";document.getElementById("reader").style.display="block";render();}
function showHome(){saveCurrent();document.getElementById("reader").style.display="none";document.getElementById("home").style.display="block";}
function move(step){saveCurrent();currentChapter=(currentChapter+step+chapters.length)%chapters.length;render();}
function render(){
  const c=chapters[currentChapter];
  document.getElementById("day").textContent="DAY "+(currentChapter+1)+" · "+(currentChapter+1)+"/"+chapters.length;
  document.getElementById("chapterTitle").textContent="마태오 "+c[0];
  document.getElementById("subtitle").textContent=c[3];
  document.getElementById("explain").textContent=c[1];
  document.getElementById("question").textContent=c[2];
  document.getElementById("verse").value=localStorage.getItem(key("verse",currentChapter)) || "";
  document.getElementById("memo").value=localStorage.getItem(key("memo",currentChapter)) || "";
  updateWrittenDate();
  let jump="";
  for(let i=0;i<chapters.length;i++) jump += `<button onclick="openChapter(${i})">${i+1}</button>`;
  document.getElementById("jump").innerHTML=jump;
}
document.getElementById("verse").addEventListener("input", saveCurrent);
document.getElementById("memo").addEventListener("input", saveCurrent);
render();
</script>
</body>
</html>
